<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Your Miles</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
            --info-bg: #eff6ff;
            --info-text: #1d4ed8;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .hero {
            text-align: center;
            margin-bottom: 28px;
        }

        .hero h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 3vw, 3rem);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .notice {
            max-width: 760px;
            margin: 0 auto 28px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 18px;
            color: var(--muted);
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 1.25rem;
        }

        .current-total {
            margin-bottom: 16px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .current-total strong {
            color: var(--text);
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
        }

        input:focus {
            outline: 2px solid rgba(37, 99, 235, 0.18);
            border-color: var(--accent);
        }

        button {
            width: 100%;
            margin-top: 16px;
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 16px;
            font-weight: 700;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        .message {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            display: none;
        }

        .message.success {
            display: block;
            background: var(--success-bg);
            color: var(--success-text);
        }

        .message.error {
            display: block;
            background: var(--error-bg);
            color: var(--error-text);
        }

        .message.info {
            display: block;
            background: var(--info-bg);
            color: var(--info-text);
        }

        .page-error {
            max-width: 760px;
            margin: 0 auto 24px;
            padding: 14px 16px;
            border-radius: 12px;
            background: var(--error-bg);
            color: var(--error-text);
            display: none;
        }

        .footer-link {
            text-align: center;
            margin-top: 30px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .header-link {
            text-align: center;
            margin-bottom: 30px;
            color: var(--muted);
        }

        .header-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .header-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1>Update Your Miles</h1>
        </div>

        <div class="notice">
            This page sets your total miles directly. If you ran, walked, or biked more, do the math on your side and
            enter your updated total here.
        </div>

        <div class="header-link">
            <a href="./index.html">Back to tracker</a>
        </div>

        <div id="pageError" class="page-error"></div>
        <div id="peopleGrid" class="grid"></div>

        <div class="footer-link">
            <a href="./index.html">Back to tracker</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const peopleGrid = document.getElementById("peopleGrid");
        const pageError = document.getElementById("pageError");

        function formatMiles(value) {
            const rounded = Number(value).toFixed(2);
            return Number(rounded).toString();
        }

        function showPageError(message) {
            pageError.textContent = message;
            pageError.style.display = "block";
        }

        function createPersonCard(personId, person) {
            const miles = Number(person.miles) || 0;

            const card = document.createElement("div");
            card.className = "card";
            card.dataset.personId = personId;

            card.innerHTML = `
        <h2>${person.name}</h2>
        <div class="current-total">
          Current total: <strong>${formatMiles(miles)}</strong> / 100 miles
        </div>

        <label for="total-${personId}">New total miles</label>
        <input
          id="total-${personId}"
          type="number"
          step="0.01"
          min="0"
          inputmode="decimal"
          value="${miles}"
          placeholder="${formatMiles(miles)}"
        />

        <button type="button" data-person-id="${personId}">
          Update Miles
        </button>

        <div id="message-${personId}" class="message"></div>
      `;

            return card;
        }

        function setMessage(personId, type, text) {
            const message = document.getElementById(`message-${personId}`);
            message.className = `message ${type}`;
            message.textContent = text;
        }

        function clearMessage(personId) {
            const message = document.getElementById(`message-${personId}`);
            message.className = "message";
            message.textContent = "";
        }

        function renderPeople(peopleObj) {
            peopleGrid.innerHTML = "";
            for (const [personId, person] of Object.entries(peopleObj || {})) {
                peopleGrid.appendChild(createPersonCard(personId, person));
            }
        }

        onValue(ref(db, "people"), (snapshot) => {
            const peopleObj = snapshot.val() || {};
            renderPeople(peopleObj);
            pageError.style.display = "none";
        }, (error) => {
            showPageError(error.message);
        });

        document.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-person-id]");
            if (!button) return;

            const personId = button.dataset.personId;
            const totalInput = document.getElementById(`total-${personId}`);
            const newTotal = Number(totalInput.value);

            clearMessage(personId);

            if (!Number.isFinite(newTotal) || newTotal < 0) {
                setMessage(personId, "error", "Please enter a valid total of 0 or more.");
                return;
            }

            const currentTotalText = document.querySelector(
                `[data-person-id="${personId}"] .current-total strong`
            )?.textContent;

            const currentTotal = Math.round(Number(currentTotalText) * 100) / 100;
            const roundedNewTotal = Math.round(newTotal * 100) / 100;

            if (Number.isFinite(currentTotal) && roundedNewTotal === currentTotal) {
                setMessage(personId, "info", "No change detected.");
                return;
            }

            button.disabled = true;
            button.textContent = "Submitting...";
            setMessage(personId, "info", "Submitting update...");

            try {
                await update(ref(db, `people/${personId}`), {
                    miles: roundedNewTotal
                });

                totalInput.value = roundedNewTotal;
                setMessage(personId, "success", `Updated total to ${formatMiles(roundedNewTotal)} miles.`);
            } catch (error) {
                setMessage(personId, "error", error.message || "Update failed.");
            } finally {
                button.disabled = false;
                button.textContent = "Update Miles";
            }
        });
    </script>
</body>

</html>
